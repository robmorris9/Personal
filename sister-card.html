document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n<title>Camping Card for Meg<\u002Ftitle>\n<style>/* latin */\n@font-face {\n  font-family: 'Fredoka One';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"1b58bcf8-3fcd-4bf2-a071-c5a274099921\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n\n<style>\n* { margin:0; padding:0; box-sizing:border-box; }\n:root {\n    --bg:   #E8D4C0;\n    --ink:  #1A4A28;\n    --mtn:  #2D5016;\n    --mtn2: #3D6B20;\n    --orng: #D98A41;\n    --rust: #A65D2E;\n    --lake: #38706B;\n}\n\nhtml {\n    height: 100%;\n    height: -webkit-fill-available;\n}\nbody {\n    margin:0; padding:0;\n    width:100%; height:100%;\n    background:#1A4A28;\n    overflow:hidden;\n}\n\n.scroll-container {\n    width:100%; height:100vh;\n    height: -webkit-fill-available;\n    overflow-y: scroll;\n    overflow-x: hidden;\n    scroll-snap-type: y mandatory;\n    -webkit-overflow-scrolling: touch;\n}\n\n.page {\n    scroll-snap-align: start;\n    scroll-snap-stop: always;\n    width: 100%;\n    height: 100vh;\n    height: -webkit-fill-available;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    overflow: hidden;\n}\n.page-1 { background: #1A4A28; }\n.page-2 { background: #E8D4C0; }\n.page-3 { background: #E8D4C0; }\n\n.poster-svg {\n    width: 100%;\n    height: 100%;\n    display: block;\n}\n\n/* ─── FLAG ─── */\n.flag-sway {\n    transform-box: fill-box;\n    transform-origin: 22px 290px;\n    animation: flagSway 3.5s ease-in-out infinite;\n}\n@keyframes flagSway {\n    0%,100% { transform: rotate(-5deg); }\n    50%      { transform: rotate(5deg); }\n}\n\n/* ─── PAGE 1 TEXT ─── */\n.hey-t { animation: slideL .75s cubic-bezier(.22,1,.36,1) .3s both; }\n.meg-t { animation: slideR .75s cubic-bezier(.22,1,.36,1) .5s both; }\n\n/* ─── SCROLL BUTTON ─── */\n.scroll-btn { opacity:0; animation: fadeIn 1s ease 2s forwards; cursor: pointer; }\n.scroll-arr { animation: bounceD 1.4s ease-in-out infinite; transform-box:fill-box; transform-origin: center top; }\n@keyframes bounceD { 0%,100%{transform:translateY(0)} 50%{transform:translateY(9px)} }\n\n/* ─── SUN ─── */\n.sun-rays { animation: spinCW 24s linear infinite; transform-box:fill-box; transform-origin: center center; }\n.sun-orb  { animation: pulse 3s ease-in-out infinite; transform-box:fill-box; transform-origin: center; }\n@keyframes spinCW { to { transform: rotate(360deg); } }\n@keyframes pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }\n\n/* ─── BIRDS ─── */\n.birds-l { animation: flyL 16s linear infinite; will-change: transform; }\n.birds-r { animation: flyR 20s linear infinite 4s; will-change: transform; }\n@keyframes flyL { from{transform:translateX(950px)} to{transform:translateX(-400px)} }\n@keyframes flyR { from{transform:translateX(-900px)} to{transform:translateX(400px)} }\n\n/* ─── FLAMES ─── */\n.fl { transform-box:fill-box; transform-origin: center bottom; }\n.fl-1 { animation: fA 2.1s ease-in-out infinite; }\n.fl-2 { animation: fB 2.5s ease-in-out infinite .3s; }\n.fl-3 { animation: fA 1.9s ease-in-out infinite .6s; }\n.fl-4 { animation: fB 2.3s ease-in-out infinite .15s; }\n.fl-5 { animation: fA 2.7s ease-in-out infinite .45s; }\n@keyframes fA { 0%,100%{transform:scaleY(.9) rotate(-5deg) skewX(-3deg)} 50%{transform:scaleY(1.15) rotate(5deg) skewX(3deg)} }\n@keyframes fB { 0%,100%{transform:scaleY(1.1) rotate(4deg) skewX(2deg)} 50%{transform:scaleY(.85) rotate(-4deg) skewX(-2deg)} }\n\n/* ─── WAVES — seamless 400px (2-period) loop, slow duration hides seam ─── */\n.wl { animation: waveL var(--wd,12s) linear infinite; will-change:transform; }\n.wr { animation: waveR var(--wd,16s) linear infinite; will-change:transform; }\n@keyframes waveL { from{transform:translateX(0)} to{transform:translateX(-400px)} }\n@keyframes waveR { from{transform:translateX(0)} to{transform:translateX(400px)} }\n\n/* ─── CANOE — straight path across lake ─── */\n.canoe { animation: canoeX 28s linear infinite 2s; will-change: transform; }\n@keyframes canoeX { from{transform:translateX(-160px)} to{transform:translateX(930px)} }\n\n/* ─── OWL ─── */\n.owl-float { animation: owlF 3.8s ease-in-out infinite; transform-box:fill-box; transform-origin: center bottom; }\n@keyframes owlF { 0%,100%{transform:translateY(0) rotate(-1.5deg)} 50%{transform:translateY(-14px) rotate(1.5deg)} }\n.eye   { animation: blink 4s ease-in-out infinite;      transform-box:fill-box; transform-origin:center; }\n.eye-r { animation: blink 4s ease-in-out infinite .15s; transform-box:fill-box; transform-origin:center; }\n@keyframes blink { 0%,46%,56%,100%{transform:scaleY(1)} 50%,52%{transform:scaleY(.06)} }\n/* Waving right wing */\n.owl-wave { animation: owlWave 1.1s ease-in-out infinite; transform-box:fill-box; transform-origin: -10px -10px; }\n@keyframes owlWave {\n    0%   { transform: rotate(0deg); }\n    30%  { transform: rotate(-52deg); }\n    60%  { transform: rotate(8deg); }\n    100% { transform: rotate(0deg); }\n}\n\n/* ─── PAGE 3 REVEAL ─── */\n.msg-l  { opacity:0; transform:translateX(-750px); }\n.msg-r  { opacity:0; transform:translateX(750px); }\n.sign-off { opacity:0; transform:translateY(28px); }\n.msg-l.vis  { animation: slideL .85s cubic-bezier(.22,1,.36,1) forwards; }\n.msg-r.vis  { animation: slideR .85s cubic-bezier(.22,1,.36,1) forwards; }\n.sign-off.vis { animation: signIn .9s ease .4s forwards; }\n\n@keyframes slideL { from{transform:translateX(-750px);opacity:0} to{transform:translateX(0);opacity:1} }\n@keyframes slideR { from{transform:translateX(750px); opacity:0} to{transform:translateX(0);opacity:1} }\n@keyframes signIn { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }\n@keyframes fadeIn { from{opacity:0} to{opacity:1} }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"scroll-container\" id=\"scroller\">\n\n\n\n<div class=\"page page-1\" id=\"page1\">\n<svg class=\"poster-svg\" viewBox=\"0 0 750 1000\" preserveAspectRatio=\"xMidYMid slice\" xmlns=\"http://www.w3.org/2000/svg\">\n\n    <rect width=\"750\" height=\"1000\" fill=\"#1A4A28\"><\u002Frect>\n\n    \n    <text class=\"hey-t\" x=\"375\" y=\"318\" text-anchor=\"middle\" font-family=\"'Fredoka One',sans-serif\" font-size=\"210\" fill=\"#E8D4C0\">HEY<\u002Ftext>\n    <text class=\"meg-t\" x=\"375\" y=\"528\" text-anchor=\"middle\" font-family=\"'Fredoka One',sans-serif\" font-size=\"210\" fill=\"#E8D4C0\">MEG<\u002Ftext>\n\n    \n    <g style=\"opacity:0;animation:fadeIn 1.2s ease 2.2s forwards\" transform=\"translate(150,862)\">\n        \n        <g transform=\"translate(0,-42) scale(1.55)\" style=\"transform-origin:0 0\">\n            <g transform=\"translate(-22,-18)\">\n                <polygon points=\"0,10 10,10 22,2 22,38 10,30 0,30\" fill=\"#E8D4C0\" stroke=\"#E8D4C0\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon>\n                <path d=\"M26,14 Q34,20 26,26\" fill=\"none\" stroke=\"#E8D4C0\" stroke-width=\"3.5\" stroke-linecap=\"round\"><\u002Fpath>\n                <path d=\"M30,8 Q43,20 30,32\" fill=\"none\" stroke=\"#E8D4C0\" stroke-width=\"3.5\" stroke-linecap=\"round\"><\u002Fpath>\n            <\u002Fg>\n        <\u002Fg>\n        <text y=\"24\" text-anchor=\"middle\" font-family=\"'Fredoka One',sans-serif\" font-size=\"20\" fill=\"#E8D4C0\" opacity=\".65\" letter-spacing=\"2\">SOUND ON<\u002Ftext>\n    <\u002Fg>\n\n    \n    <g style=\"opacity:0;animation:fadeIn .8s ease 1.1s forwards\" transform=\"translate(375,615)\">\n      <g class=\"flag-sway\">\n        <line x1=\"22\" y1=\"290\" x2=\"22\" y2=\"10\" stroke=\"#E8D4C0\" stroke-width=\"8\" stroke-linecap=\"round\"><\u002Fline>\n        \n {\n                    el.setAttribute('class', item.base);\n                }\n            });\n        });\n    }, { threshold: 0.35 });\n    obs.observe(page3);\n})();\n\n// ─── Web Audio: campfire + birds ─────────────────────────────────\nvar audioCtx = null;\nfunction initAudio() {\n    if (audioCtx) return;\n    audioCtx = new (window.AudioContext || window.webkitAudioContext)();\n    var ctx = audioCtx;\n    var bufSize = ctx.sampleRate * 4;\n    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);\n    var data = buf.getChannelData(0);\n    for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;\n\n    function noise(freq, q, gain, type) {\n        type = type || 'bandpass';\n        var src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;\n        var flt = ctx.createBiquadFilter(); flt.type = type; flt.frequency.value = freq;\n        if (q) flt.Q.value = q;\n        var gn = ctx.createGain(); gn.gain.value = gain;\n        src.connect(flt); flt.connect(gn); gn.connect(ctx.destination); src.start();\n    }\n    noise(120, null, 0.16, 'lowpass');\n    noise(600,  3,   0.055);\n    noise(2200, 5,   0.020);\n\n    function pop() {\n        setTimeout(function() {\n            var o = ctx.createOscillator(), g = ctx.createGain();\n            o.type = 'sine'; o.frequency.value = Math.random() * 180 + 80;\n            g.gain.setValueAtTime(0.22, ctx.currentTime);\n            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.065);\n            o.connect(g); g.connect(ctx.destination);\n            o.start(); o.stop(ctx.currentTime + 0.065);\n            pop();\n        }, Math.random() * 900 + 200);\n    }\n    pop();\n\n    function chirp() {\n        setTimeout(function() {\n            var n = Math.floor(Math.random() * 4) + 2;\n            for (var i = 0; i < n; i++) {\n                (function(ii) {\n                    setTimeout(function() {\n                        var o = ctx.createOscillator(), g = ctx.createGain();\n                        o.type = 'sine';\n                        var f = Math.random() * 900 + 2200;\n                        o.frequency.setValueAtTime(f, ctx.currentTime);\n                        o.frequency.exponentialRampToValueAtTime(f * 1.35, ctx.currentTime + 0.07);\n                        o.frequency.exponentialRampToValueAtTime(f, ctx.currentTime + 0.14);\n                        g.gain.setValueAtTime(0, ctx.currentTime);\n                        g.gain.linearRampToValueAtTime(0.048, ctx.currentTime + 0.025);\n                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);\n                        o.connect(g); g.connect(ctx.destination);\n                        o.start(); o.stop(ctx.currentTime + 0.15);\n                    }, ii * 215);\n                })(i);\n            }\n            chirp();\n        }, Math.random() * 5000 + 2000);\n    }\n    chirp();\n}\n\n['click', 'touchstart', 'scroll'].forEach(function(ev) {\n    document.addEventListener(ev, initAudio, { once: true, capture: true });\n});\n\n// ─── TWEAKS ──────────────────────────────────────────────────────\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentColor\": \"#D98A41\",\n  \"inkColor\": \"#1A4A28\",\n  \"bgColor\": \"#E8D4C0\",\n  \"waveSpeed\": 1.7,\n  \"animSpeed\": 1\n}/*EDITMODE-END*/;\n\nlet tweakVals = Object.assign({}, TWEAK_DEFAULTS);\n\nfunction applyTweaks(v) {\n    // Colors\n    document.documentElement.style.setProperty('--orng', v.accentColor);\n    document.documentElement.style.setProperty('--ink',  v.inkColor);\n    document.documentElement.style.setProperty('--bg',   v.bgColor);\n    document.querySelectorAll('#page1 rect').forEach(el => el.setAttribute('fill', v.inkColor));\n    document.querySelectorAll('.page-1').forEach(el => el.style.background = v.inkColor);\n    document.querySelectorAll('.page-2, .page-3').forEach(el => el.style.background = v.bgColor);\n    // Wave speed: scale animation durations\n    document.querySelectorAll('.wl').forEach((el,i) => {\n        var base = [12,14][i % 2];\n        el.style.animationDuration = (base / v.waveSpeed) + 's';\n    });\n    document.querySelectorAll('.wr').forEach((el,i) => {\n        var base = [16,18][i % 2];\n        el.style.animationDuration = (base / v.waveSpeed) + 's';\n    });\n    // Overall anim speed\n    var sd = 1 / v.animSpeed;\n    document.querySelectorAll('.fl-1').forEach(el => el.style.animationDuration = (2.1*sd)+'s');\n    document.querySelectorAll('.fl-2').forEach(el => el.style.animationDuration = (2.5*sd)+'s');\n    document.querySelectorAll('.fl-3').forEach(el => el.style.animationDuration = (1.9*sd)+'s');\n    document.querySelectorAll('.birds-l').forEach(el => el.style.animationDuration = (16*sd)+'s');\n    document.querySelectorAll('.birds-r').forEach(el => el.style.animationDuration = (20*sd)+'s');\n}\n\n// Tweaks panel HTML\nvar tweakPanel = document.createElement('div');\ntweakPanel.id = 'tweaks-panel';\ntweakPanel.style.cssText = 'display:none;position:fixed;bottom:24px;right:24px;z-index:9999;' +\n    'background:#1A4A28;color:#E8D4C0;border-radius:16px;padding:20px 22px;width:260px;' +\n    'font-family:\\'Fredoka One\\',sans-serif;font-size:15px;box-shadow:0 4px 24px rgba(0,0,0,0.35);';\ntweakPanel.innerHTML = '<div style=\"font-size:18px;margin-bottom:14px;letter-spacing:1px\">TWEAKS<\u002Fdiv>' +\n    row('Accent color','accentColor','color') +\n    row('Ink color','inkColor','color') +\n    row('Background','bgColor','color') +\n    rowSlider('Wave speed','waveSpeed',0.3,3,0.1) +\n    rowSlider('Anim speed','animSpeed',0.3,3,0.1);\n\nfunction row(label, key, type) {\n    return '<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">' +\n        '<span>' + label + '<\u002Fspan>' +\n        '<input type=\"' + type + '\" value=\"' + tweakVals[key] + '\" data-key=\"' + key + '\" ' +\n        'style=\"width:44px;height:28px;border:none;border-radius:6px;cursor:pointer;padding:2px\">' +\n        '<\u002Fdiv>';\n}\nfunction rowSlider(label, key, min, max, step) {\n    return '<div style=\"margin-bottom:10px\">' +\n        '<div style=\"display:flex;justify-content:space-between;margin-bottom:4px\">' +\n        '<span>' + label + '<\u002Fspan><span id=\"tv-'+key+'\">' + tweakVals[key] + '<\u002Fspan><\u002Fdiv>' +\n        '<input type=\"range\" min=\"'+min+'\" max=\"'+max+'\" step=\"'+step+'\" value=\"'+tweakVals[key]+'\" ' +\n        'data-key=\"'+key+'\" style=\"width:100%;accent-color:#D98A41\">' +\n        '<\u002Fdiv>';\n}\n\ndocument.body.appendChild(tweakPanel);\n\ntweakPanel.addEventListener('input', function(e) {\n    var key = e.target.dataset.key;\n    if (!key) return;\n    tweakVals[key] = e.target.type === 'range' ? parseFloat(e.target.value) : e.target.value;\n    var label = document.getElementById('tv-' + key);\n    if (label) label.textContent = tweakVals[key];\n    applyTweaks(tweakVals);\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweakVals }, '*');\n});\n\nwindow.addEventListener('message', function(e) {\n    if (e.data && e.data.type === '__activate_edit_mode')   tweakPanel.style.display = 'block';\n    if (e.data && e.data.type === '__deactivate_edit_mode') tweakPanel.style.display = 'none';\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\napplyTweaks(tweakVals);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
