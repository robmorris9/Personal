<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Camping Card for Meg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
    --bg:   #E8D4C0;
    --ink:  #1A4A28;
    --mtn:  #2D5016;
    --mtn2: #3D6B20;
    --orng: #D98A41;
    --rust: #A65D2E;
    --lake: #38706B;
}

html {
    height: 100%;
    height: -webkit-fill-available;
}
body {
    margin:0; padding:0;
    width:100%; height:100%;
    background:#1A4A28;
    overflow:hidden;
}

.scroll-container {
    width:100%; height:100vh;
    height: -webkit-fill-available;
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
}

.page {
    scroll-snap-align: start;
    scroll-snap-stop: always;
    width: 100%;
    height: 100vh;
    height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.page-1 { background: #1A4A28; }
.page-2 { background: #E8D4C0; }
.page-3 { background: #E8D4C0; }

.poster-svg {
    width: 100%;
    height: 100%;
    display: block;
}

/* ─── FLAG ─── */
.flag-sway {
    transform-box: fill-box;
    transform-origin: 22px 290px;
    animation: flagSway 3.5s ease-in-out infinite;
}
@keyframes flagSway {
    0%,100% { transform: rotate(-5deg); }
    50%      { transform: rotate(5deg); }
}

/* ─── PAGE 1 TEXT ─── */
.hey-t { animation: slideL .75s cubic-bezier(.22,1,.36,1) .3s both; }
.meg-t { animation: slideR .75s cubic-bezier(.22,1,.36,1) .5s both; }

/* ─── SCROLL BUTTON ─── */
.scroll-btn { opacity:0; animation: fadeIn 1s ease 2s forwards; cursor: pointer; }
.scroll-arr { animation: bounceD 1.4s ease-in-out infinite; transform-box:fill-box; transform-origin: center top; }
@keyframes bounceD { 0%,100%{transform:translateY(0)} 50%{transform:translateY(9px)} }

/* ─── SUN ─── */
.sun-rays { animation: spinCW 24s linear infinite; transform-box:fill-box; transform-origin: center center; }
.sun-orb  { animation: pulse 3s ease-in-out infinite; transform-box:fill-box; transform-origin: center; }
@keyframes spinCW { to { transform: rotate(360deg); } }
@keyframes pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

/* ─── BIRDS ─── */
.birds-l { animation: flyL 16s linear infinite; will-change: transform; }
.birds-r { animation: flyR 20s linear infinite 4s; will-change: transform; }
@keyframes flyL { from{transform:translateX(950px)} to{transform:translateX(-400px)} }
@keyframes flyR { from{transform:translateX(-900px)} to{transform:translateX(400px)} }

/* ─── FLAMES ─── */
.fl { transform-box:fill-box; transform-origin: center bottom; }
.fl-1 { animation: fA 2.1s ease-in-out infinite; }
.fl-2 { animation: fB 2.5s ease-in-out infinite .3s; }
.fl-3 { animation: fA 1.9s ease-in-out infinite .6s; }
.fl-4 { animation: fB 2.3s ease-in-out infinite .15s; }
.fl-5 { animation: fA 2.7s ease-in-out infinite .45s; }
@keyframes fA { 0%,100%{transform:scaleY(.9) rotate(-5deg) skewX(-3deg)} 50%{transform:scaleY(1.15) rotate(5deg) skewX(3deg)} }
@keyframes fB { 0%,100%{transform:scaleY(1.1) rotate(4deg) skewX(2deg)} 50%{transform:scaleY(.85) rotate(-4deg) skewX(-2deg)} }

/* ─── WAVES — seamless 400px (2-period) loop, slow duration hides seam ─── */
.wl { animation: waveL var(--wd,12s) linear infinite; will-change:transform; }
.wr { animation: waveR var(--wd,16s) linear infinite; will-change:transform; }
@keyframes waveL { from{transform:translateX(0)} to{transform:translateX(-400px)} }
@keyframes waveR { from{transform:translateX(0)} to{transform:translateX(400px)} }

/* ─── CANOE — straight path across lake ─── */
.canoe { animation: canoeX 28s linear infinite 2s; will-change: transform; }
@keyframes canoeX { from{transform:translateX(-160px)} to{transform:translateX(930px)} }

/* ─── OWL ─── */
.owl-float { animation: owlF 3.8s ease-in-out infinite; transform-box:fill-box; transform-origin: center bottom; }
@keyframes owlF { 0%,100%{transform:translateY(0) rotate(-1.5deg)} 50%{transform:translateY(-14px) rotate(1.5deg)} }
.eye   { animation: blink 4s ease-in-out infinite;      transform-box:fill-box; transform-origin:center; }
.eye-r { animation: blink 4s ease-in-out infinite .15s; transform-box:fill-box; transform-origin:center; }
@keyframes blink { 0%,46%,56%,100%{transform:scaleY(1)} 50%,52%{transform:scaleY(.06)} }
/* Waving right wing */
.owl-wave { animation: owlWave 1.1s ease-in-out infinite; transform-box:fill-box; transform-origin: -10px -10px; }
@keyframes owlWave {
    0%   { transform: rotate(0deg); }
    30%  { transform: rotate(-52deg); }
    60%  { transform: rotate(8deg); }
    100% { transform: rotate(0deg); }
}

/* ─── PAGE 3 REVEAL ─── */
.msg-l  { opacity:0; transform:translateX(-750px); }
.msg-r  { opacity:0; transform:translateX(750px); }
.sign-off { opacity:0; transform:translateY(28px); }
.msg-l.vis  { animation: slideL .85s cubic-bezier(.22,1,.36,1) forwards; }
.msg-r.vis  { animation: slideR .85s cubic-bezier(.22,1,.36,1) forwards; }
.sign-off.vis { animation: signIn .9s ease .4s forwards; }

@keyframes slideL { from{transform:translateX(-750px);opacity:0} to{transform:translateX(0);opacity:1} }
@keyframes slideR { from{transform:translateX(750px); opacity:0} to{transform:translateX(0);opacity:1} }
@keyframes signIn { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>

<script>
document.getElementById('scrollBtn').addEventListener('click', function() {
    var s = document.getElementById('scroller');
    s.scrollTo({ top: s.clientHeight, behavior: 'smooth' });
});

(function() {
    var page3 = document.getElementById('page3');
    var items = [
        { id:'m1', base:'msg-l',   vis:'msg-l vis' },
        { id:'m2', base:'msg-r',   vis:'msg-r vis' },
        { id:'m3', base:'msg-l',   vis:'msg-l vis' },
        { id:'m4', base:'sign-off',vis:'sign-off vis' },
    ];
    var obs = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
            items.forEach(function(item, i) {
                var el = document.getElementById(item.id);
                if (e.isIntersecting) {
                    setTimeout(function() {
                        el.setAttribute('class', item.vis);
                    }, i * 175);
                } else {
                    el.setAttribute('class', item.base);
                }
            });
        });
    }, { threshold: 0.35 });
    obs.observe(page3);
})();

var audioCtx = null;
function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var ctx = audioCtx;
    var bufSize = ctx.sampleRate * 4;
    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

    function noise(freq, q, gain, type) {
        type = type || 'bandpass';
        var src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
        var flt = ctx.createBiquadFilter(); flt.type = type; flt.frequency.value = freq;
        if (q) flt.Q.value = q;
        var gn = ctx.createGain(); gn.gain.value = gain;
        src.connect(flt); flt.connect(gn); gn.connect(ctx.destination); src.start();
    }
    noise(120, null, 0.16, 'lowpass');
    noise(600,  3,   0.055);
    noise(2200, 5,   0.020);

    function pop() {
        setTimeout(function() {
            var o = ctx.createOscillator(), g = ctx.createGain();
            o.type = 'sine'; o.frequency.value = Math.random() * 180 + 80;
            g.gain.setValueAtTime(0.22, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.065);
            o.connect(g); g.connect(ctx.destination);
            o.start(); o.stop(ctx.currentTime + 0.065);
            pop();
        }, Math.random() * 900 + 200);
    }
    pop();

    function chirp() {
        setTimeout(function() {
            var n = Math.floor(Math.random() * 4) + 2;
            for (var i = 0; i < n; i++) {
                (function(ii) {
                    setTimeout(function() {
                        var o = ctx.createOscillator(), g = ctx.createGain();
                        o.type = 'sine';
                        var f = Math.random() * 900 + 2200;
                        o.frequency.setValueAtTime(f, ctx.currentTime);
                        o.frequency.exponentialRampToValueAtTime(f * 1.35, ctx.currentTime + 0.07);
                        o.frequency.exponentialRampToValueAtTime(f, ctx.currentTime + 0.14);
                        g.gain.setValueAtTime(0, ctx.currentTime);
                        g.gain.linearRampToValueAtTime(0.048, ctx.currentTime + 0.025);
                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);
                        o.connect(g); g.connect(ctx.destination);
                        o.start(); o.stop(ctx.currentTime + 0.15);
                    }, ii * 215);
                })(i);
            }
            chirp();
        }, Math.random() * 5000 + 2000);
    }
    chirp();
}

['click', 'touchstart', 'scroll'].forEach(function(ev) {
    document.addEventListener(ev, initAudio, { once: true, capture: true });
});
</script>
