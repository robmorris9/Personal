<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Camping Card for Meg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
    --bg:   #E8D4C0;
    --ink:  #1A4A28;
    --mtn:  #2D5016;
    --mtn2: #3D6B20;
    --orng: #D98A41;
    --rust: #A65D2E;
    --lake: #38706B;
}

html { height: 100%; height: -webkit-fill-available; }
body {
    margin:0; padding:0;
    width:100%; height:100%;
    background:#1A4A28;
    overflow:hidden;
}

.scroll-container {
    width:100%; height:100dvh;
    height: -webkit-fill-available;
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
}

.page {
    scroll-snap-align: start;
    scroll-snap-stop: always;
    width: 100%;
    height: 100dvh;
    height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.page-1 { background: #1A4A28; }
.page-2 { background: #E8D4C0; }
.page-3 { background: #E8D4C0; }

.poster-svg {
    width: 100%;
    height: 100%;
    max-height: 100dvh;
    display: block;
}

/* ─── PORTRAIT LOCK OVERLAY ─── */
#portrait-lock {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: var(--ink);
    color: var(--bg);
    z-index: 10000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    font-family: 'Fredoka One', sans-serif;
}
@media (orientation: landscape) and (max-height: 600px) and (pointer: coarse) {
    #portrait-lock { display: flex; }
    .scroll-container { display: none; }
}

/* Portrait lock phone rotate animation */
.phone-rotate-icon {
    animation: phoneRotate 2.2s ease-in-out infinite;
    transform-origin: center center;
    display: block;
    margin-bottom: 20px;
}
@keyframes phoneRotate {
    0%   { transform: rotate(0deg); }
    30%  { transform: rotate(-90deg); }
    60%  { transform: rotate(-90deg); }
    80%  { transform: rotate(0deg); }
    100% { transform: rotate(0deg); }
}

/* ─── FLAG ─── */
.flag-sway {
    transform-box: fill-box;
    transform-origin: 22px 290px;
    animation: flagSway 3.5s ease-in-out infinite;
}
@keyframes flagSway {
    0%,100% { transform: rotate(-5deg); }
    50%      { transform: rotate(5deg); }
}

/* ─── PAGE 1 TEXT ─── */
.hey-t { animation: slideL .75s cubic-bezier(.22,1,.36,1) .3s both; }
.meg-t { animation: slideR .75s cubic-bezier(.22,1,.36,1) .5s both; }

/* ─── SCROLL ARROWS ─── */
.scroll-btn { opacity:0; animation: fadeIn 1s ease 2s forwards; cursor: pointer; }
.scroll-arr { animation: bounceD 1.4s ease-in-out infinite; transform-box:fill-box; transform-origin: center top; }
@keyframes bounceD { 0%,100%{transform:translateY(0)} 50%{transform:translateY(9px)} }

/* ─── PAGE 2 DYNAMIC CARET ─── */
.fade-in-delayed { animation: fadeIn 1.2s ease 1s forwards; }

/* ─── SOUND TOGGLE ─── */
#soundToggle { cursor: pointer; }

/* ─── SUN ─── */
.sun-rays { animation: spinCW 24s linear infinite; transform-box:fill-box; transform-origin: center center; }
.sun-orb  { animation: pulse 3s ease-in-out infinite; transform-box:fill-box; transform-origin: center; }
@keyframes spinCW { to { transform: rotate(360deg); } }
@keyframes pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

/* ─── BIRDS ─── */
.birds-l { animation: flyL 28s linear infinite; }
.birds-r { animation: flyR 35s linear infinite 4s; }
@keyframes flyL { from{transform:translateX(1500px)} to{transform:translateX(-800px)} }
@keyframes flyR { from{transform:translateX(-800px)} to{transform:translateX(1500px)} }

/* ─── FLAMES ─── */
.fl { transform-box:fill-box; transform-origin: center bottom; }
.fl-1 { animation: fA 2.1s ease-in-out infinite; }
.fl-2 { animation: fB 2.5s ease-in-out infinite .3s; }
.fl-3 { animation: fA 1.9s ease-in-out infinite .6s; }
.fl-4 { animation: fB 2.3s ease-in-out infinite .15s; }
.fl-5 { animation: fA 2.7s ease-in-out infinite .45s; }
@keyframes fA { 0%,100%{transform:scaleY(.9) rotate(-5deg) skewX(-3deg)} 50%{transform:scaleY(1.15) rotate(5deg) skewX(3deg)} }
@keyframes fB { 0%,100%{transform:scaleY(1.1) rotate(4deg) skewX(2deg)} 50%{transform:scaleY(.85) rotate(-4deg) skewX(-2deg)} }

/* ─── WAVES ─── */
.wl { animation: waveL var(--wd,12s) linear infinite; }
.wr { animation: waveR var(--wd,16s) linear infinite; }
@keyframes waveL { from{transform:translateX(0)} to{transform:translateX(-400px)} }
@keyframes waveR { from{transform:translateX(0)} to{transform:translateX(400px)} }

/* ─── CANOE ─── */
.canoe { animation: canoeX 50s linear infinite 2s; }
@keyframes canoeX { from{transform:translateX(-600px)} to{transform:translateX(1350px)} }

/* ─── OWL ─── */
.owl-float { animation: owlF 3.8s ease-in-out infinite; transform-box:fill-box; transform-origin: center bottom; }
@keyframes owlF { 0%,100%{transform:translateY(0) rotate(-1.5deg)} 50%{transform:translateY(-14px) rotate(1.5deg)} }
.eye   { animation: blink 4s ease-in-out infinite;      transform-box:fill-box; transform-origin:center; }
.eye-r { animation: blink 4s ease-in-out infinite .15s; transform-box:fill-box; transform-origin:center; }
@keyframes blink { 0%,46%,56%,100%{transform:scaleY(1)} 50%,52%{transform:scaleY(.06)} }

/* ─── PAGE 3 STAR TWINKLE — occasional flash, mostly visible ─── */
.star { animation: twinkle var(--td, 10s) ease-in-out infinite var(--delay, 0s); transform-box:fill-box; transform-origin:center; }
@keyframes twinkle {
    0%,40%   { opacity:1;   transform:scale(1);    }
    46%      { opacity:.1;  transform:scale(.5);   }
    52%      { opacity:1;   transform:scale(1.2);  }
    58%      { opacity:.35; transform:scale(.75);  }
    64%,100% { opacity:1;   transform:scale(1);    }
}

/* ─── PAGE 3 REVEAL ─── */
.msg-l  { opacity:0; transform:translateX(-750px); }
.msg-r  { opacity:0; transform:translateX(750px); }
.sign-off { opacity:0; transform:translateY(28px); }
.nature-el { opacity:0; }
.msg-l.vis  { animation: slideL .85s cubic-bezier(.22,1,.36,1) forwards; }
.msg-r.vis  { animation: slideR .85s cubic-bezier(.22,1,.36,1) forwards; }
.sign-off.vis { animation: signIn .9s ease .4s forwards; }
.nature-el.vis { animation: fadeIn .9s ease forwards; }

@keyframes slideL { from{transform:translateX(-750px);opacity:0} to{transform:translateX(0);opacity:1} }
@keyframes slideR { from{transform:translateX(750px); opacity:0} to{transform:translateX(0);opacity:1} }
@keyframes signIn { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>

<script>
// ─── SCROLL BUTTON ───
document.getElementById('scrollBtn').addEventListener('click', function() {
    var s = document.getElementById('scroller');
    s.scrollTo({ top: s.clientHeight, behavior: 'smooth' });
});

// ─── PAGE 2 PARALLAX ───
(function() {
    var scroller = document.getElementById('scroller');
    var page2    = document.getElementById('page2');
    var mtnFar   = document.getElementById('mtn-far');
    var mtnNear  = document.getElementById('mtn-near');

    var ticking = false;
    scroller.addEventListener('scroll', function() {
        if (!ticking) {
            requestAnimationFrame(function() {
                // How far have we scrolled into page 2 (0 = just entered, 1 = fully past)
                var scrollTop  = scroller.scrollTop;
                var pageH      = scroller.clientHeight;
                // Page 2 starts at pageH (after page 1)
                var progress   = (scrollTop - pageH) / pageH; // -1 to +1 range
                var clamped    = Math.max(-1, Math.min(1, progress));

                // Far mountains move less (5px max)
                var farOffset  = clamped * -5;
                // Near mountains move more (12px max)
                var nearOffset = clamped * -12;

                mtnFar.setAttribute('transform',  'translate(0,' + farOffset  + ')');
                mtnNear.setAttribute('transform', 'translate(0,' + nearOffset + ')');

                ticking = false;
            });
            ticking = true;
        }
    }, { passive: true });
})();

// ─── PAGE 3 + PAGE 2 CARET OBSERVERS ───
(function() {
    var page3 = document.getElementById('page3');
    var items = [
        { id:'m1',          base:'msg-l',    vis:'msg-l vis',    delay:0   },
        { id:'m2',          base:'msg-r',    vis:'msg-r vis',    delay:175 },
        { id:'m3',          base:'msg-l',    vis:'msg-l vis',    delay:350 },
        { id:'m4',          base:'sign-off', vis:'sign-off vis', delay:525 },
        { id:'p3-moon',     base:'nature-el',vis:'nature-el vis',delay:680 },
        { id:'p3-stars',    base:'nature-el',vis:'nature-el vis',delay:780 },
        { id:'p3-trees-l',  base:'nature-el',vis:'nature-el vis',delay:860 },
        { id:'p3-trees-r',  base:'nature-el',vis:'nature-el vis',delay:860 },
        { id:'p3-ground',   base:'nature-el',vis:'nature-el vis',delay:950 },
        { id:'p3-corgi',    base:'nature-el',vis:'nature-el vis',delay:1050 },
        { id:'p3-bench',    base:'nature-el',vis:'nature-el vis',delay:1100 },
    ];

    var obs3 = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
            items.forEach(function(item) {
                var el = document.getElementById(item.id);
                if (!el) return;
                if (e.isIntersecting) {
                    setTimeout(function() {
                        el.setAttribute('class', item.vis);
                    }, item.delay);
                } else {
                    el.setAttribute('class', item.base);
                }
            });
        });
    }, { threshold: 0.35 });
    obs3.observe(page3);

    // Page 2 caret
    var page2   = document.getElementById('page2');
    var p2Caret = document.getElementById('p2-caret');
    var obs2 = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
            if (e.isIntersecting) {
                p2Caret.setAttribute('class', 'fade-in-delayed');
                obs2.unobserve(page2);
            }
        });
    }, { threshold: 0.35 });
    obs2.observe(page2);
})();

// ─── AUDIO SYSTEM ───
var audioCtx   = null;
var masterGain = null;
var isPlaying  = false;

function initAudioSystem() {
    if (audioCtx) return;
    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);

    var ctx     = audioCtx;
    var bufSize = ctx.sampleRate * 4;
    var buf     = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var data    = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

    function noise(freq, q, gain, type) {
        type = type || 'bandpass';
        var src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
        var flt = ctx.createBiquadFilter(); flt.type = type; flt.frequency.value = freq;
        if (q) flt.Q.value = q;
        var gn = ctx.createGain(); gn.gain.value = gain;
        src.connect(flt); flt.connect(gn);
        gn.connect(masterGain);
        src.start();
    }
    noise(120, null, 0.16, 'lowpass');
    noise(600,  3,   0.055);
    noise(2200, 5,   0.020);

    function pop() {
        setTimeout(function() {
            var o = ctx.createOscillator(), g = ctx.createGain();
            o.type = 'sine'; o.frequency.value = Math.random() * 180 + 80;
            g.gain.setValueAtTime(0.22, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.065);
            o.connect(g); g.connect(masterGain);
            o.start(); o.stop(ctx.currentTime + 0.065);
            pop();
        }, Math.random() * 900 + 200);
    }
    pop();

    function chirp() {
        setTimeout(function() {
            var n = Math.floor(Math.random() * 4) + 2;
            for (var i = 0; i < n; i++) {
                (function(ii) {
                    setTimeout(function() {
                        var o = ctx.createOscillator(), g = ctx.createGain();
                        o.type = 'sine';
                        var f = Math.random() * 900 + 2200;
                        o.frequency.setValueAtTime(f, ctx.currentTime);
                        o.frequency.exponentialRampToValueAtTime(f * 1.35, ctx.currentTime + 0.07);
                        o.frequency.exponentialRampToValueAtTime(f, ctx.currentTime + 0.14);
                        g.gain.setValueAtTime(0, ctx.currentTime);
                        g.gain.linearRampToValueAtTime(0.048, ctx.currentTime + 0.025);
                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);
                        o.connect(g); g.connect(masterGain);
                        o.start(); o.stop(ctx.currentTime + 0.15);
                    }, ii * 215);
                })(i);
            }
            chirp();
        }, Math.random() * 5000 + 2000);
    }
    chirp();
}

function toggleAudio() {
    initAudioSystem();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isPlaying = !isPlaying;
    masterGain.gain.setTargetAtTime(isPlaying ? 1 : 0, audioCtx.currentTime, 0.1);
    document.getElementById('text-sound').textContent = isPlaying ? "SOUND ON" : "SOUND OFF";
    document.getElementById('icon-sound-on').style.display  = isPlaying ? "block" : "none";
    document.getElementById('icon-sound-off').style.display = isPlaying ? "none"  : "block";
}

document.getElementById('soundToggle').addEventListener('click', toggleAudio);
</script>
